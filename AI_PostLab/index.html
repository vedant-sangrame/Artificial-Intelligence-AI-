<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="robot" aria-hidden="true">
      <div class="antenna"></div>
      <div class="head">
        <div class="eye"></div>
        <div class="eye"></div>
        <div class="mouth"></div>
      </div>
      <div class="body"></div>
    </div>

    <div class="chatbox">
      <h1>Chatbot</h1>
      <div id="chatWindow" class="chat-window" aria-live="polite"></div>
      <form id="chatForm" class="chat-form" autocomplete="off">
        <input id="userInput" type="text" placeholder="Type your question..." required />
        <button type="submit">Send</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
